<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣夜市探險記</title>

<style>
body{
margin:0;
font-family:"Microsoft JhengHei",sans-serif;
background:linear-gradient(-45deg,#0f172a,#1e293b,#6366f1,#0ea5e9);
background-size:400% 400%;
animation:bg 10s ease infinite;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:800px;
max-width:90%;
background:rgba(255,255,255,.1);
backdrop-filter:blur(10px);
padding:30px;
border-radius:20px;
color:white;
text-align:center;
}

button{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
opacity:0.8;
}
</style>

</head>
<body>

<div class="card">

<h1>🌃 台灣夜市探險記</h1>

<h2 id="question"></h2>

<div id="choices"></div>

</div>

<script>

const story = {

start:{
text:"你來到台灣後，晚上決定去哪裡？",
choices:[
{text:"🌃 去夜市",next:"food"}
]
},

food:{
text:"在夜市裡，你最想吃什麼？",
choices:[
{text:"🍢 蚵仔煎",next:"drink"},
{text:"🍢 臭豆腐",next:"drink"}
]
},

drink:{
text:"吃完小吃後，你想喝什麼？",
choices:[
{text:"🧋 珍珠奶茶",next:"temple"},
{text:"🥤 可樂",next:"temple"}
]
},

temple:{
text:"你經過廟口文化區，學到什麼？",
choices:[
{text:"🏮 祈福",next:"bus"},
{text:"🏮 拜拜",next:"bus"}
]
},

bus:{
text:"回家的路上，你看到什麼？",
choices:[
{text:"🚌 公車站",next:"end"},
{text:"🚕 計程車",next:"end"}
]
},

end:{
text:"🎉 恭喜完成台灣夜市探險！",
choices:[
{text:"🔄 再玩一次",next:"start"}
]
}

};

function showScene(key){

const scene=story[key];

document.getElementById("question").innerText=scene.text;

const choicesDiv=document.getElementById("choices");

choicesDiv.innerHTML="";

scene.choices.forEach(choice=>{

const btn=document.createElement("button");

btn.innerText=choice.text;

btn.onclick=()=>{
showScene(choice.next);
};

choicesDiv.appendChild(btn);

});

}

showScene("start");

</script>

</body>
</html>
