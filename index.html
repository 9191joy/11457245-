<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣夜市探險記</title>
<style>
body{
margin:0;
font-family:"Microsoft JhengHei",sans-serif;
background:linear-gradient(-45deg,#0f172a,#1e293b,#6366f1,#0ea5e9,#22c55e);
background-size:400% 400%;
animation:bg 12s ease infinite;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}
@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}
.card{
width:850px;
max-width:90%;
background:rgba(255,255,255,.1);
backdrop-filter:blur(15px);
padding:30px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,.4);
text-align:center;
}
button{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:18px;
background:#334155;
color:white;
cursor:pointer;
}
button:hover{
background:#475569;
}
.stats{
margin-bottom:20px;
color:#facc15;
}
#result{
font-size:22px;
margin-top:15px;
}
</style>
</head>
<body>
<div class="card">
<h1>🌃 台灣夜市探險記</h1>
<div class="stats">
⭐ 文化分數：<span id="culture">0</span><br>
🈶 華語能力：<span id="language">0</span><br>
📚 學到詞彙：<span id="words">0</span>
</div>
<h2 id="question"></h2>
<div id="choices"></div>
<div id="result"></div>
</div>
<script>
let culture = 0;
let language = 10;
let words = [];
const story = {
start:{
text:"你來到台灣夜市，第一站想去哪裡？",
choices:[
{ text:"🍢 小吃區", next:"food"},
{ text:"🧋 飲料店", next:"drink"},
{ text:"🏮 廟口文化區", next:"temple"}
]
},
food:{
text:"你學到了哪一個台灣小吃？",
choices:[
{
text:"蚵仔煎",
action:()=>{
words.push("蚵仔煎");
culture += 30;
},
next:"nightmarket"
},
{
text:"臭豆腐",
action:()=>{
words.push("臭豆腐");
culture += 30;
},
next:"nightmarket"
}
]
},
drink:{
text:"台灣最有名的飲料是？",
choices:[
{
text:"珍珠奶茶",
action:()=>{
words.push("珍珠奶茶");
culture += 40;
},
next:"nightmarket"
},
{
text:"蘋果汁",
action:()=>{
culture += 10;
},
next:"nightmarket"
}
]
},
temple:{
text:"你在廟口學到了什麼？",
choices:[
{
text:"祈福",
action:()=>{
words.push("祈福");
culture += 40;
},
next:"nightmarket"
},
{
text:"拜拜",
action:()=>{
words.push("拜拜");
culture += 40;
},
next:"nightmarket"
}
]
},
nightmarket:{
text:"接下來要做什麼？",
choices:[
{
text:"🎯 玩遊戲攤",
action:()=>{
culture += 50;
},
next:"quiz"
},
{
text:"🏨 回飯店",
next:"quiz"
}
]
},
quiz:{
text:"哪個是台灣有名的飲料？",
choices:[
{
text:"珍珠奶茶",
correct:true,
next:"ending"
},
{
text:"咖啡",
correct:false,
next:"ending"
}
]
},
ending:{
end:true
}
};
function updateStats(){
document.getElementById("culture").innerText = culture;
document.getElementById("language").innerText = language;
document.getElementById("words").innerText = words.length;
}
function showScene(sceneName){
const scene = story[sceneName];
const q = document.getElementById("question");
const c = document.getElementById("choices");
const r = document.getElementById("result");
c.innerHTML="";
r.innerHTML="";
updateStats();
if(scene.end){
let endingText="📖 普通結局";
if(culture>=120){
endingText="🏆 真結局：夜市文化達人";
}
else if(culture>=80){
endingText="😊 好結局：文化探索家";
}
q.innerHTML=endingText;
c.innerHTML=`
<p>
最終文化分數：${culture}<br>
學到詞彙：${words.length} 個
</p>
`;
const btn=document.createElement("button");
btn.innerText="🔄 再玩一次";
btn.onclick=()=>{
culture=0;
language=10;
words=[];
showScene("start");
};
c.appendChild(btn);
return;
}
q.innerText=scene.text;
scene.choices.forEach(choice=>{
const btn=document.createElement("button");
btn.innerText=choice.text;
btn.onclick=()=>{
if(choice.action){
choice.action();
}
if(choice.correct!==undefined){
r.innerHTML=choice.correct
? "🎉 答對了！"
: "😅 答錯了！";
r.style.color=choice.correct
? "#22c55e"
: "#ef4444";
setTimeout(()=>{
showScene(choice.next);
},1200);
}else{
showScene(choice.next);
}
};
c.appendChild(btn);
});
}
showScene("start");
</script>
</body>
</html>
